<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="stylesheet" href="common.css"></head><body>
<header class="topbar">
  <div><p class="eyebrow">Library</p><h1>収集済み書籍</h1></div>
  <div class="topbar-actions">
    <div class="menu-shell">
      <button class="secondary menu-toggle" id="menu-toggle" aria-expanded="false" aria-haspopup="true">MENU</button>
      <div class="action-menu" id="action-menu" hidden>
        <button class="menu-item" id="csv">CSV出力</button>
        <button class="menu-item" id="guide">取り込みガイド</button>
        <button class="menu-item" id="options">解析ルール</button>
        <button class="menu-item" id="show-exclusions">除外リスト</button>
        <button class="menu-item danger-text" id="clear">全件削除</button>
      </div>
    </div>
  </div>
</header>
<main class="container manager-container">
  <aside class="manager-sidebar card">
    <div class="summary-card"><span class="muted">表示中</span><strong id="summary"></strong></div>
    <label class="filter-field">検索<input type="search" id="query" placeholder="タイトル・著者・ID"></label>
    <label class="favorite-filter"><input type="checkbox" id="favorite-only">お気に入りのみ</label>
    <label class="filter-field">サービス<select id="source"><option value="">すべて</option></select></label>
    <button class="danger service-delete" id="delete-service" disabled>選択サービスを削除</button>
    <label class="filter-field">並び順<select id="sort"><option value="added-asc" selected>本棚追加順（昇順）</option><option value="added-desc">本棚追加順（降順）</option><option value="updated-desc">最終確認が新しい順</option><option value="title-asc">タイトル昇順</option><option value="title-desc">タイトル降順</option><option value="volumes-desc">所持巻数が多い順</option><option value="volumes-asc">所持巻数が少ない順</option><option value="source-asc">サービス順</option></select></label>
    <div class="status-filter-group"><span>ステータス</span><div id="status-filters" class="status-filter-tags"></div></div>
    <div class="status" id="status"></div>
  </aside>
  <section class="manager-results">
    <div class="table-wrap"><table class="book-table"><thead><tr><th></th><th>書籍</th><th>サービス</th><th>所持巻数</th><th>ステータス</th><th>日時</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></div>
  </section>
</main>
<div class="row-action-popover" id="row-action-popover" hidden>
  <button data-popover-action="edit-status">ステータス編集</button>
  <button class="danger-text" data-popover-action="delete">削除</button>
</div>
<dialog class="modal" id="excluded-dialog">
  <div class="modal-heading">
    <div><h2>除外リスト</h2><p class="muted" id="excluded-summary"></p></div>
    <button class="secondary" id="close-exclusions">閉じる</button>
  </div>
  <div class="table-wrap excluded-wrap"><table class="book-table excluded-table"><thead><tr><th>書籍</th><th>サービス</th><th>ID</th><th>除外日時</th><th>操作</th></tr></thead><tbody id="excluded-rows"></tbody></table></div>
</dialog>
<dialog class="modal status-modal" id="status-dialog">
  <form method="dialog" id="status-form">
    <div class="modal-heading">
      <div><h2>ステータス編集</h2><p class="muted" id="status-target"></p></div>
      <button class="secondary" value="cancel">閉じる</button>
    </div>
    <div class="status-editor">
      <div><span class="field-caption">自動ステータス</span><div class="badges" id="auto-statuses"></div></div>
      <div><span class="field-caption">既存ステータス</span><div class="status-picker" id="status-picker"></div></div>
      <label class="filter-field">手動ステータス<textarea id="manual-statuses" rows="6" placeholder="1行に1つずつ入力"></textarea></label>
      <p class="muted">手動ステータスは収集で上書きされず、一覧・検索・CSVに反映されます。</p>
    </div>
    <div class="modal-actions"><button class="secondary" value="cancel">キャンセル</button><button id="save-statuses" value="default">保存</button></div>
  </form>
</dialog>
<button id="back-to-top" class="back-to-top" aria-label="ページトップへ戻る">↑</button>
<script src="core.js"></script><script src="manager.js"></script></body></html>

<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="stylesheet" href="common.css"></head><body>
<header class="topbar"><h1>解析ルール</h1></header><main class="container"><div class="card"><p>各サービスは <code>id → name → urlPatterns → importGuide → bookSelector → fields → titleCleanup → seriesGrouping</code> の順です。項目ごとに日本語の <code>label</code> が付きます。</p><p class="muted"><code>importGuide</code> は取り込みガイドへの掲載内容、<code>fields</code> は抽出項目、<code>titleCleanup</code> はタイトル共通補正、<code>seriesGrouping.volumePatterns</code> は巻数抽出とシリーズ集約です。任意JavaScriptは実行しません。</p><textarea id="rules" spellcheck="false"></textarea><div class="actions" style="margin-top:12px"><button id="save">保存</button><button class="secondary" id="format">整形</button><button class="danger" id="reset">標準に戻す</button></div><div class="status" id="status"></div></div></main><script src="default-rules.js"></script><script src="options.js"></script></body></html>
